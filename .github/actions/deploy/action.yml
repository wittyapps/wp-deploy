name: WordPress Deploy
description: Downloads a GitHub release zip and deploys it to a WordPress wp-content directory via SCP/SSH.

inputs:
  github_token:
    description: GitHub token used to authenticate the release zip download. Defaults to the GITHUB_TOKEN environment variable automatically injected by the runner.
    required: false
    default: ''
  type:
    description: "Target wp-content subdirectory type: 'plugin' or 'theme'"
    required: true
  servers:
    description: >
      JSON array of server objects for deploying to multiple servers.
      Each object may contain: ssh_host, ssh_user, ssh_private_key, ssh_port (default: 22),
      dest_base_path (default: /public_html/wp-content).
      When provided, the individual ssh_host/ssh_user/ssh_private_key inputs are ignored.
    required: false
    default: ''
  ssh_host:
    description: SSH server hostname or IP address (single-server mode)
    required: false
  ssh_user:
    description: SSH username (single-server mode)
    required: false
  ssh_private_key:
    description: SSH private key (PEM or OpenSSH format) (single-server mode)
    required: false
  ssh_port:
    description: SSH port (single-server mode)
    required: false
    default: '22'
  dest_base_path:
    description: Base path to wp-content on the remote server (single-server mode)
    required: false
    default: /public_html/wp-content

runs:
  using: node24
  main: dist/index.js

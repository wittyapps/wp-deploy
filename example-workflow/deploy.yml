# Copy this file into your plugin or theme repo at:
#   .github/workflows/deploy.yml
#
# ── Staging secrets (releases from the 'develop' branch) ─────────────────────
#   STAGING_SERVERS_JSON  — JSON array of staging server objects
#
# ── Production secrets (releases from the 'master' branch) ───────────────────
#   PRODUCTION_SERVERS_JSON — JSON array of production server objects
#
# Releases created from the 'develop' branch deploy to staging.
# Releases created from the 'master' branch deploy to production.
#
# Set `type` to 'plugin' or 'theme' to control the wp-content subdirectory.
#
# Example value for STAGING_SERVERS_JSON / PRODUCTION_SERVERS_JSON:
# [
#   {"ssh_host":"server1.example.com","ssh_user":"deploy","ssh_private_key":"<KEY>"},
#   {"ssh_host":"server2.example.com","ssh_user":"deploy","ssh_private_key":"<KEY>","ssh_port":"2222","dest_base_path":"/var/www/wp-content"}
# ]

name: Deploy to WordPress

on:
  release:
    types: [published]

jobs:
  # ── Staging deployment (releases from the develop branch) ────────────────────
  deploy-staging:
    if: github.event.release.target_commitish == 'develop'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: wittyapps/wp-deploy/.github/actions/deploy@main
        with:
          type: plugin        # or theme
          servers: ${{ secrets.STAGING_SERVERS_JSON }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

  # ── Production deployment (releases from the master branch) ──────────────────
  deploy-production:
    if: github.event.release.target_commitish == 'master'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: wittyapps/wp-deploy/.github/actions/deploy@main
        with:
          type: plugin        # or theme
          servers: ${{ secrets.PRODUCTION_SERVERS_JSON }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
